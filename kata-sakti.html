<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>KATA SAKTI ULTRA - APeL</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #083344;
      --bg2: #0f766e;
      --panel: #fffdf7;
      --line: #1f2937;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #0ea5a4;
      --accent: #f59e0b;
      --danger: #ef4444;
      --soft-success: #dcfce7;
      --soft-primary: #ccfbf1;
      --soft-accent: #ffedd5;
      --white: #ffffff;
      --shadow: 0 8px 0 #111827;
      --shadow-sm: 0 4px 0 #111827;
      --cell-size: min(8.8vw, 42px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: 'Fredoka', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.13) 0 2px, transparent 2px),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.1) 0 2px, transparent 2px),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      background-size: 28px 28px, 36px 36px, cover;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px;
    }

    [hidden] {
      display: none !important;
    }

    .app {
      width: 100%;
      max-width: 620px;
      background: var(--panel);
      border: 3px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 14px;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: stretch;
      margin-bottom: 12px;
    }

    .brand {
      background: linear-gradient(135deg, #14b8a6, #0f766e);
      color: white;
      border: 3px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow-sm);
      padding: 10px 14px;
    }

    .brand-title {
      font-size: 1.15rem;
      line-height: 1;
      margin: 0 0 4px;
      letter-spacing: .5px;
    }

    .brand-sub {
      font-size: .82rem;
      opacity: .95;
      margin: 0;
    }

    .icon-btn {
      border: 3px solid var(--line);
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
      min-width: 52px;
      min-height: 52px;
      font-size: 1.2rem;
      cursor: pointer;
      position: relative;
      z-index: 5;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .stat {
      background: var(--white);
      border: 3px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
      padding: 10px 8px;
      text-align: center;
    }

    .stat-label {
      display: block;
      font-size: .72rem;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .stat-value {
      display: block;
      font-size: 1.05rem;
      color: var(--text);
    }

    .progress-wrap {
      margin-bottom: 12px;
      background: #e5e7eb;
      border: 3px solid var(--line);
      border-radius: 999px;
      height: 18px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444);
      transition: width .25s ease;
    }

    .panel {
      background: rgba(255,255,255,0.92);
      border: 3px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow-sm);
      padding: 12px;
      margin-bottom: 12px;
    }

    .mission {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 2px solid var(--line);
      background: var(--soft-primary);
      font-size: .82rem;
    }

    .learn-box {
      background: var(--soft-accent);
      border: 3px dashed var(--line);
      border-radius: 16px;
      padding: 10px 12px;
      min-height: 72px;
    }

    .learn-title {
      font-size: .9rem;
      margin: 0 0 4px;
    }

    .learn-text {
      margin: 0;
      font-size: .86rem;
      color: var(--text);
      line-height: 1.45;
    }

    .grid-shell {
      background: #111827;
      border: 3px solid var(--line);
      border-radius: 18px;
      padding: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    #grid {
      display: grid;
      gap: 4px;
      justify-content: center;
      touch-action: none;
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--white);
      color: var(--text);
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      text-transform: uppercase;
      transition: transform .08s ease, background .12s ease, color .12s ease;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.08);
    }

    .cell.preview {
      background: #fde68a;
      color: #7c2d12;
      transform: scale(.96);
    }

    .cell.anchor {
      background: #fdba74;
      color: #7c2d12;
    }

    .cell.found {
      background: var(--primary);
      color: white;
    }

    .cell.hint {
      background: #bfdbfe;
      color: #1d4ed8;
      animation: pulseHint .85s ease-in-out 2;
    }

    @keyframes pulseHint {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(.92); }
    }

    .word-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .word-item {
      border: 3px solid var(--line);
      border-radius: 14px;
      background: #f3f4f6;
      box-shadow: var(--shadow-sm);
      padding: 8px 10px;
      text-align: center;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .86rem;
      line-height: 1.2;
    }

    .word-item.done {
      background: var(--soft-success);
      color: #166534;
      text-decoration: line-through;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .btn {
      border: 3px solid var(--line);
      border-radius: 14px;
      background: var(--white);
      box-shadow: var(--shadow-sm);
      padding: 8px 6px;
      font-size: .82rem;
      cursor: pointer;
      text-align: center;
      line-height: 1.2;
    }

    .btn.primary {
      background: var(--primary);
      color: white;
    }

    .btn.danger {
      background: var(--danger);
      color: white;
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #111827;
    }

    /* ===== Overlay start & end menu ===== */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,0.88);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      z-index: 30;
    }

    .menu-card {
      width: 100%;
      max-width: 520px;
      max-height: 100%;
      background: var(--panel);
      border-radius: 24px;
      border: 3px solid var(--line);
      box-shadow: var(--shadow);
      padding: 18px 16px 14px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      overflow: hidden;
    }

    .menu-card h2 {
      margin: 0 0 6px;
      font-size: 1.3rem;
      text-align: center;
    }

    .menu-card p {
      margin: 0 0 10px;
      font-size: .88rem;
      text-align: center;
      color: var(--muted);
    }

    .menu-grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      padding-right: 4px;
      margin-bottom: 8px;
    }

    .theme-card {
      border-radius: 18px;
      border: 3px solid var(--line);
      background: #f3f4f6;
      padding: 10px;
    }

    .theme-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: .9rem;
    }

    .menu-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .menu-btn {
      border-radius: 16px;
      border: 3px solid var(--line);
      background: white;
      padding: 8px 8px;
      font-size: .86rem;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      text-align: center;
      min-height: 52px;
    }

    .menu-btn.primary {
      margin-top: 4px;
      width: 100%;
      background: var(--primary);
      color: white;
    }

    .menu-btn.selected {
      background: #bbf7d0;
      border-color: #16a34a;
    }

    .tiny {
      font-size: .72rem;
      color: var(--muted);
    }

    .footer-note {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 2px;
      text-align: center;
    }

    .toast {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: #111827;
      color: white;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: .8rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      z-index: 50;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -4px);
    }

    .stars {
      display: flex;
      justify-content: center;
      gap: 4px;
      font-size: 1.4rem;
      margin-top: 6px;
    }

    @media (min-width: 720px) {
      :root {
        --cell-size: 40px;
      }

      .menu-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
